name: Scrape Products and Sync to Supabase

on:
  schedule:
    # Run daily at 17:00 UTC (12:00 AM / midnight in Vietnam ICT)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Required for committing and pushing JSON files back to the repository

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper and Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape_full_flow.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/products.json assets/data/products_detailed.json
          if git diff --staged --quiet; then
            echo "No changes to product data."
          else
            git commit -m "chore: automated update of product data [skip ci]"
            git push
          fi
